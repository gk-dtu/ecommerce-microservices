spring.application.name=order-service
server.port=8083

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Circuit Breaker config
resilience4j.circuitbreaker.instances.productClient.register-health-indicator=true
resilience4j.circuitbreaker.instances.productClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.productClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productClient.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productClient.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.userClient.register-health-indicator=true
resilience4j.circuitbreaker.instances.userClient.sliding-window-size=5
resilience4j.circuitbreaker.instances.userClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userClient.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userClient.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.productClient.ignore-exceptions=feign.FeignException.NotFound
resilience4j.circuitbreaker.instances.userClient.ignore-exceptions=feign.FeignException.NotFound

# Retry config
resilience4j.retry.instances.productClient.max-attempts=3
resilience4j.retry.instances.productClient.wait-duration=2s
resilience4j.retry.instances.productClient.retry-exceptions=feign.FeignException.ServiceUnavailable,feign.FeignException.InternalServerError
resilience4j.retry.instances.productClient.ignore-exceptions=feign.FeignException.NotFound
resilience4j.retry.instances.userClient.max-attempts=3
resilience4j.retry.instances.userClient.wait-duration=2s
resilience4j.retry.instances.userClient.retry-exceptions=feign.FeignException.ServiceUnavailable,feign.FeignException.InternalServerError
resilience4j.retry.instances.userClient.ignore-exceptions=feign.FeignException.NotFound

# Timeout config
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
