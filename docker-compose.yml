version: '3.8'

# ══════════════════════════════════════════════════════════════════
#  ECOMMERCE MICROSERVICES — Docker Compose
#
#  Startup order:
#  postgres → discovery-server → (all other services)
#
#  Spring Profile "docker" activates PostgreSQL config
#  All services share "ecommerce-net" bridge network
# ══════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────
  # 1. POSTGRESQL DATABASE
  #    Starts first — services depend on it
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aviraj
      POSTGRES_PASSWORD: aviraj123
      POSTGRES_MULTIPLE_DATABASES: userdb,productdb,orderdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviraj"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # ─────────────────────────────────────────────────────────────
  # 2. DISCOVERY SERVER (Eureka)
  # ─────────────────────────────────────────────────────────────
  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - ecommerce-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -c UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ─────────────────────────────────────────────────────────────
  # 3. API GATEWAY
  # ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────────────────────────
  # 4. USER SERVICE
  # ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────────────────────────
  # 5. PRODUCT SERVICE
  # ─────────────────────────────────────────────────────────────
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────────────────────────
  # 6. ORDER SERVICE
  # ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

# ─────────────────────────────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────────────────────────────
networks:
  ecommerce-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────
# VOLUMES
# postgres-data persists your database even after container stops
# Without this, all data lost on docker compose down
# ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data: